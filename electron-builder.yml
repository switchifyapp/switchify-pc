appId: app.switchify.pc
productName: Switchify PC
copyright: Copyright © 2026 Owen McGirr

directories:
  output: dist
  buildResources: build

afterPack: scripts/apply-win-icon.cjs

files:
  - out/**/*
  - package.json

asar: true
asarUnpack:
  - node_modules/@nut-tree-fork/libnut-win32/**/*

extraResources:
  - from: build/icon.png
    to: icon.png

win:
  icon: build/icon.ico
  signAndEditExecutable: false
  target:
    - target: dir
      arch:
        - x64
